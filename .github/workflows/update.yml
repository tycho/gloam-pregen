name: Update generated loaders

on:
  schedule:
    # Daily at 06:17 UTC (off-minute to avoid cron stampede)
    - cron: '17 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Used by gloam for the GitHub API (provenance acquisition).  The automatic
    # token reads public repos fine and lifts the rate limit to 1000 req/hr.
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: Query latest crate version
        id: crate_version
        shell: bash
        run: |
          set -euo pipefail
          CRATE="gloam"
          API_URL="https://crates.io/api/v1/crates/${CRATE}"

          VERSION="$(
            curl -fsSL \
              -H 'Accept: application/json' \
              -A "github-actions-${GITHUB_REPOSITORY}/1.0" \
              "${API_URL}" \
            | jq -er '.crate.max_stable_version'
          )"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Restore cargo-install cache
        id: cargo_cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-install-gloam-${{ steps.crate_version.outputs.version }}

      - name: Install gloam ${{ steps.crate_version.outputs.version }}
        run: |
          cargo install gloam \
            --version "${{ steps.crate_version.outputs.version }}" \
            --locked

      - name: Save cargo-install cache
        if: steps.cargo_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-install-gloam-${{ steps.crate_version.outputs.version }}

      # Persist gloam's provenance cache (SQLite + WAL sidecars) across runs so
      # unchanged upstream blobs aren't re-downloaded.  A unique key always
      # saves; restore-keys restores the most recent prior cache.
      - name: Restore gloam provenance cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/gloam
          key: gloam-provenance-${{ steps.crate_version.outputs.version }}
          restore-keys: |
            gloam-provenance-

      # Snapshot file sizes before regeneration so we can detect regressions.
      - name: Record baseline sizes
        run: |
          find vulkan gl-egl -type f \( -name '*.h' -o -name '*.c' \) \
            -exec stat --format='%n %s' {} + | sort > /tmp/sizes-before.txt
          cat /tmp/sizes-before.txt

      # Wipe old output so removed files don't linger.
      - name: Clean previous output
        run: |
          rm -rf vulkan/include vulkan/src vulkan/.gloam
          rm -rf vulkan-aio/include vulkan-aio/src vulkan-aio/.gloam
          rm -rf gl-egl/include gl-egl/src gl-egl/.gloam

      # Preflight: snapshot every upstream source at its current HEAD once, so
      # all three loaders below are generated from one consistent instant.
      - name: Snapshot upstream provenance
        run: gloam --fetch lock --out manifest.json

      - name: Generate Vulkan loader (with Vulkan-Headers dependency)
        run: >
          gloam
          --api vk
          --lock manifest.json
          --fetch
          --out-path vulkan
          --quiet
          c --alias --loader --external-headers

      - name: Generate Vulkan loader (AIO)
        run: >
          gloam
          --api vk
          --lock manifest.json
          --fetch
          --out-path vulkan-aio
          --quiet
          c --alias --loader

      - name: Generate GL + GLES2 (merged) and EGL loaders
        run: >
          gloam
          --api gl:core,gles2,egl
          --merge
          --lock manifest.json
          --fetch
          --out-path gl-egl
          --quiet
          c --alias --loader

      - name: Save gloam provenance cache
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/gloam
          key: gloam-provenance-${{ steps.crate_version.outputs.version }}

      - name: Clone Vulkan-Headers
        uses: actions/checkout@v6
        with:
          repository: KhronosGroup/Vulkan-Headers
          path: Vulkan-Headers
          fetch-depth: 0

      # Sanity: the generated C must compile.
      - name: Compile check
        run: |
          gcc -fsyntax-only -IVulkan-Headers/include -Ivulkan/include vulkan/src/vulkan.c
          gcc -fsyntax-only -Ivulkan-aio/include vulkan-aio/src/vulkan.c
          gcc -fsyntax-only -Igl-egl/include gl-egl/src/gl.c
          gcc -fsyntax-only -Igl-egl/include gl-egl/src/egl.c

      # Fail if any tracked file shrank by more than 10% — that almost
      # certainly means something went wrong upstream or in gloam itself.
      - name: Size regression check
        run: |
          find vulkan gl-egl -type f \( -name '*.h' -o -name '*.c' \) \
            -exec stat --format='%n %s' {} + | sort > /tmp/sizes-after.txt

          failures=0
          while IFS=' ' read -r file before; do
            after=$(awk -v f="$file" '$1 == f { print $2 }' /tmp/sizes-after.txt)
            if [ -z "$after" ]; then
              echo "MISSING: $file was removed"
              failures=1
              continue
            fi
            threshold=$(( before * 90 / 100 ))
            if [ "$after" -lt "$threshold" ]; then
              echo "SHRUNK: $file went from $before to $after bytes (>10% decrease)"
              failures=1
            fi
          done < /tmp/sizes-before.txt

          if [ "$failures" -ne 0 ]; then
            echo "::error::Size regression detected — see above. Aborting."
            exit 1
          fi
          echo "Size check passed."

      # Commit and push only if the output actually changed.  The commit message
      # is built from manifest.json: the gloam version plus each upstream repo's
      # git describe and commit, so the history records exactly what was used.
      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            gloam_ver="$(jq -r '.gloam.describe' manifest.json)"
            sources="$(
              jq -r '
                .provenance
                | to_entries | map(.value)
                | group_by(.repo)[]
                | "- \(.[0].repo) @ \(.[0].describe) (commit \(.[0].commit[0:12]))"
              ' manifest.json | sort
            )"
            git commit \
              -m "chore: update generated output (gloam ${gloam_ver})" \
              -m "Regenerated from this upstream snapshot:" \
              -m "${sources}"
            git push
          fi
